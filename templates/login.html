<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - CETWorkOverTime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }
        .login-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .login-title {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .login-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(91, 141, 238, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-login:hover {
            background: #4a78d8;
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        #errorMsg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 16px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon">📧</div>
        <h1 class="login-title">CETWorkOverTime</h1>
        <p class="login-subtitle">请输入 Authenticator 中的 6 位动态验证码</p>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="password">动态验证码</label>
                <input type="text" id="password" placeholder="例如：123456" pattern="\d{6}" maxlength="6" required autocomplete="off" autofocus>
            </div>
            <button type="submit" class="btn-login" id="submitBtn">登 录</button>
            <div id="errorMsg"></div>
        </form>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');

            errorMsg.textContent = '';
            submitBtn.textContent = '登录中...';
            submitBtn.disabled = true;

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await resp.json();
                if (resp.ok && data.ok) {
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.error || '密码错误！';
                    submitBtn.textContent = '登 录';
                    submitBtn.disabled = false;
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (err) {
                errorMsg.textContent = '网络错误，请稍后重试。';
                submitBtn.textContent = '登 录';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
